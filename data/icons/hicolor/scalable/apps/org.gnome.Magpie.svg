<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <title>Magpie</title>
  <defs>
    <clipPath id="platter">
      <rect width="128" height="128" rx="22" ry="22"/>
    </clipPath>
    <!-- Subtle vertical iridescence on the platter: teal-blue at top,
         shifting to teal-green at bottom — mirrors the wing-to-tail
         color shift of a black-billed magpie's plumage. -->
    <linearGradient id="iridescent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e4d6a"/>
      <stop offset="1" stop-color="#0e5550"/>
    </linearGradient>
  </defs>

  <!-- Bold iridescent backdrop, lifted directly from the bird. -->
  <rect width="128" height="128" rx="22" ry="22" fill="url(#iridescent)"/>

  <g clip-path="url(#platter)" stroke-linejoin="round" stroke-linecap="round">

    <!-- ============================================================ -->
    <!-- LEFT WING — displayed, fanning to dexter                      -->
    <!-- ============================================================ -->
    <g stroke="#0a2935" stroke-width="1.4">
      <!-- White primaries fanning out, behind the membrane -->
      <g fill="#f8f3e4">
        <path d="M 24 28 L 6 12 L 12 24 Z"/>
        <path d="M 22 34 L 2 22 L 10 34 Z"/>
        <path d="M 20 42 L 2 36 L 12 44 Z"/>
        <path d="M 20 50 L 6 52 L 18 54 Z"/>
      </g>
      <g stroke="#0a2935" stroke-width="1" fill="none">
        <path d="M 24 28 L 6 12 L 12 24 Z"/>
        <path d="M 22 34 L 2 22 L 10 34 Z"/>
        <path d="M 20 42 L 2 36 L 12 44 Z"/>
        <path d="M 20 50 L 6 52 L 18 54 Z"/>
      </g>

      <!-- Wing membrane: vivid iridescent teal-blue -->
      <path fill="#3da4c8" d="
        M 60 40
        C 50 32, 36 26, 22 28
        C 16 32, 16 40, 22 46
        C 36 52, 48 54, 60 56 Z"/>

      <!-- Emerald-teal sheen near the shoulder coverts -->
      <path fill="#3eb195" stroke="none" opacity="0.85" d="
        M 60 42
        C 52 40, 44 40, 38 42
        C 42 46, 48 48, 54 50
        C 58 52, 60 54, 60 54 Z"/>

      <!-- Scalloped covert feathers along the leading edge -->
      <g stroke="#0a2935" stroke-width="1" fill="none" opacity="0.6">
        <path d="M 56 38 Q 50 34 44 32"/>
        <path d="M 50 38 Q 42 34 34 32"/>
        <path d="M 42 38 Q 34 34 26 32"/>
      </g>
      <!-- Secondary-feather divider lines along the trailing edge -->
      <g stroke="#0a2935" stroke-width="0.7" fill="none" opacity="0.6">
        <path d="M 34 44 Q 44 48 56 52"/>
        <path d="M 28 42 Q 40 46 54 50"/>
      </g>
    </g>

    <!-- ============================================================ -->
    <!-- RIGHT WING — mirror to sinister                               -->
    <!-- ============================================================ -->
    <g stroke="#0a2935" stroke-width="1.4">
      <g fill="#f8f3e4">
        <path d="M 104 28 L 122 12 L 116 24 Z"/>
        <path d="M 106 34 L 126 22 L 118 34 Z"/>
        <path d="M 108 42 L 126 36 L 116 44 Z"/>
        <path d="M 108 50 L 122 52 L 110 54 Z"/>
      </g>
      <g stroke="#0a2935" stroke-width="1" fill="none">
        <path d="M 104 28 L 122 12 L 116 24 Z"/>
        <path d="M 106 34 L 126 22 L 118 34 Z"/>
        <path d="M 108 42 L 126 36 L 116 44 Z"/>
        <path d="M 108 50 L 122 52 L 110 54 Z"/>
      </g>

      <path fill="#3da4c8" d="
        M 68 40
        C 78 32, 92 26, 106 28
        C 112 32, 112 40, 106 46
        C 92 52, 80 54, 68 56 Z"/>

      <path fill="#3eb195" stroke="none" opacity="0.85" d="
        M 68 42
        C 76 40, 84 40, 90 42
        C 86 46, 80 48, 74 50
        C 70 52, 68 54, 68 54 Z"/>

      <g stroke="#0a2935" stroke-width="1" fill="none" opacity="0.6">
        <path d="M 72 38 Q 78 34 84 32"/>
        <path d="M 78 38 Q 86 34 94 32"/>
        <path d="M 86 38 Q 94 34 102 32"/>
      </g>
      <g stroke="#0a2935" stroke-width="0.7" fill="none" opacity="0.6">
        <path d="M 94 44 Q 84 48 72 52"/>
        <path d="M 100 42 Q 88 46 74 50"/>
      </g>
    </g>

    <!-- ============================================================ -->
    <!-- TAIL — long, central, black with vivid green sheen            -->
    <!-- ============================================================ -->
    <g stroke="#0a2935" stroke-width="1.4">
      <path fill="#161618" d="
        M 58 68
        Q 56 90, 60 112
        L 64 116
        L 68 112
        Q 72 90, 70 68 Z"/>
      <path fill="#3eb195" stroke="none" opacity="0.7" d="
        M 60 72
        Q 59 90, 62 108
        L 64 110
        L 66 108
        Q 69 90, 68 72 Z"/>
      <g stroke="#0a2935" stroke-width="0.6" fill="none" opacity="0.7">
        <path d="M 62 80 L 62 104"/>
        <path d="M 66 80 L 66 104"/>
      </g>
    </g>

    <!-- ============================================================ -->
    <!-- BODY                                                          -->
    <!-- ============================================================ -->
    <g stroke="#0a2935" stroke-width="1.4">
      <path fill="#161618" d="
        M 64 36
        C 53 36, 47 44, 47 56
        C 47 66, 53 72, 64 72
        C 75 72, 81 66, 81 56
        C 81 44, 75 36, 64 36 Z"/>
      <!-- White belly, glows against the dark backdrop -->
      <path fill="#f8f3e4" stroke="none" d="
        M 52 58
        C 54 68, 64 72, 74 70
        C 78 68, 78 64, 76 60
        C 66 64, 58 62, 52 58 Z"/>
    </g>

    <!-- ============================================================ -->
    <!-- HEAD — in profile to dexter                                   -->
    <!-- ============================================================ -->
    <g stroke="#0a2935" stroke-width="1.4">
      <ellipse fill="#161618" cx="64" cy="26" rx="10" ry="9"/>
      <!-- Beak -->
      <path fill="#161618" d="M 54 26 L 46 28 L 54 30 Z"/>
      <!-- Eye -->
      <circle fill="#f8f3e4" stroke="none" cx="58" cy="24" r="1.7"/>
      <circle fill="#161618" stroke="none" cx="58.3" cy="24.3" r="0.7"/>
    </g>

  </g>
</svg>
